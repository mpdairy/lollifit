<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lolli.Fit — recovery tools for your body</title>
  <meta name="description" content="Lolli.Fit makes massage and recovery tools to help you feel better, move better, and train harder.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="Lolli.Fit">
  <meta property="og:description" content="Recovery and massage tools for everybody.">
  <meta property="og:image" content="og-image.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lolli.fit">
  <style>
    :root {
      --bg: #fafaf7;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #db2730;
      --accent-dark: #b51e26;
      --border: #e5e5e0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .logo {
      width: 100%;
      max-width: 520px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    .tagline {
      font-size: 1.15rem;
      color: var(--muted);
      margin: 0 0 2.5rem;
      max-width: 30rem;
    }
    .signup {
      width: 100%;
      max-width: 26rem;
    }
    .signup h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--fg);
    }
    .signup p {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    input[type="email"] {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      font-family: inherit;
    }
    input[type="email"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(219, 39, 48, 0.15);
    }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-dark); }
    .note {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); }
    @media (max-width: 480px) {
      form { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <img src="logo.svg" alt="Lolli.Fit" class="logo">
    <p class="tagline">Massage and recovery tools to help you feel better, move better, and train harder.</p>

    <section class="signup">
      <h2>Get product updates</h2>
      <p>Be the first to hear about new releases and early-access drops.</p>
      <form action="https://app.kit.com/forms/9377341/subscriptions" method="post">
        <input type="email" name="email_address" placeholder="you@example.com" required aria-label="Email address">
        <button type="submit">Sign up</button>
      </form>
      <p class="note">No spam. Unsubscribe anytime.</p>
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> Lolli.Fit
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
